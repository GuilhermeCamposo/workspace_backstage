schemaVersion: 2.2.2
metadata:
  name: backstage-dev
components:
  - name: tools
    container:
      image: quay.io/devfile/universal-developer-image:ubi10-latest
      endpoints:
        - exposure: public
          name: nodejs
          protocol: https
          targetPort: 3000
      memoryLimit: 4Gi
      memoryRequest: 2Gi
      cpuLimit: '3'
      cpuRequest: '1'      
    