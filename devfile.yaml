schemaVersion: 2.2.2
metadata:
  name: backstage-dev
components:
  - name: tools
    container:
      image: quay.io/devfile/universal-developer-image:ubi10-latest
      endpoints:
        - exposure: public
          name: nodejs
          protocol: https
          targetPort: 3000
      memoryLimit: 3Gi
      memoryRequest: 512Mi
      cpuLimit: '2'
      cpuRequest: '0.25'      
    